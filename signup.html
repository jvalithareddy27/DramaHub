<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<link rel="stylesheet" href="project.css">
<script src="login.js"></script>>
</head>

<body class="signuppg">

<form id="signup">
<legend>SIGN UP!😉</legend>

<label>Name</label>
<input type="text" id="name" placeholder="Enter your name" required><br><br>

<label>Date of Birth</label>
<input type="date" id="age" required><br><br>

<label>E-Mail</label>
<input type="email" id="email" placeholder="Enter email address" required><br><br>

<label>Phone Number</label>
<input type="tel" id="phn" pattern="[6-9][0-9]{9}" placeholder="Enter mobile number" required><br><br>

<label>Create Password</label>
<input type="password" id="password"
pattern="(?=.*[0-9])(?=.*[!@#$%^&*]).{6,}"
title="Password must contain 6 characters, 1 number and 1 special character"
required><br><br>

<label>Confirm Password</label>
<input type="password" id="confirmPassword" required><br><br>

<button type="button" onclick="signupUser()">SIGN UP</button>

<p>Already have an account? <a href="login.html">login</a></p>

</form>

</body>
</html>
